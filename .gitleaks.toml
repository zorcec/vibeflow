title = "Vibeflow gitleaks config"

# Allow known safe test/fixture values
[allowlist]
description = "Known safe patterns"
regexes = [
  # Test placeholder tokens
  '''test[-_]token''',
  '''fake[-_]key''',
  '''example[-_]secret''',
]

# Block common secret patterns not covered by built-in rules
[[rules]]
id = "generic-api-key-assignment"
description = "Generic API key or secret assignment"
regex = '''(?i)(api_key|api_secret|auth_token|access_token|secret_key)\s*[:=]\s*["'][^"']{16,}["']'''
tags = ["secret", "api-key"]
